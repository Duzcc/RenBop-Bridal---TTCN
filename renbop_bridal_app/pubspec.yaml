name: renbop_bridal_app
description: Renbop Bridal — Luxury Bridal App for Customers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP & API
  dio: ^5.6.0
  pretty_dio_logger: ^1.3.1

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # UI & Images
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  smooth_page_indicator: ^1.2.0+3
  flutter_svg: ^2.0.10+1
  badges: ^3.1.2

  # Date/Time
  intl: ^0.19.0
  table_calendar: ^3.1.2

  # Utils
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.3
  fluttertoast: ^8.2.8
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # Notifications
  flutter_local_notifications: ^21.0.0
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/


