server:
  port: 8080

spring:
  application:
    name: renbo-bridal-backend
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/renbop_bridal}
    username: ${DB_USERNAME:renbop}
    password: ${DB_PASSWORD:renbop123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000
      pool-name: RenboBridalPool

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:your_email@gmail.com}
    password: ${SMTP_PASSWORD:your_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Trả về ISO 8601 thay vì timestamp number — dễ parse phía frontend
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Ho_Chi_Minh

app:
  jwt:
    secret: ${JWT_SECRET:renbo-bridal-super-secret-jwt-key-must-be-at-least-256-bits-long!}
    access-expiration-ms: 900000       # 15 phút
    refresh-expiration-ms: 604800000   # 7 ngày

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    com.renbobridal: INFO
    com.renbobridal.module.order: DEBUG
    com.renbobridal.module.auth: DEBUG
    org.springframework.security: WARN
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %highlight(%-5level) [%thread] %cyan(%logger{36}) - %msg%n"

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:123}
  api-secret: ${CLOUDINARY_API_SECRET:abc}

vnpay:
  tmn-code: ${VNPAY_TMN_CODE:DUMMYTMN}
  hash-secret: ${VNPAY_HASH_SECRET:DUMMYHASHSECRET12345678901234567890123456789012}
  url: ${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payment-result}
